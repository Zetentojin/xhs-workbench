services:
  - type: web
    name: xhs-workbench-backend
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PUBLIC_ACCESS_ENABLED
        value: "1"
      - key: XHS_ENRICH_SCRIPT
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: XHS_ENRICH_OUTPUT_DIR
        value: /opt/render/project/src/backend/exports
    disk:
      name: xhs-exports
      mountPath: /opt/render/project/src/backend/exports
      sizeGB: 10
